<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장미야</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background-color:lightyellow;
    font-family:"맑은 고딕";
}

#wrap{
    width:100%;
    height:100vh;
    border:10px solid blue;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    padding:25px;
}

/* 이미지 */
#photo{
    width:500px;
    height:auto;
    border:5px solid white;
    border-radius:15px;
    box-shadow:5px 5px 12px gray;
}

/* 하단 영역 */
#bottom{
    text-align:center;
}

/* 버튼 */
button{
    width:130px;
    height:55px;
    margin:10px;
    font-size:20px;
    font-weight:bold;
    border:none;
    border-radius:12px;
    background-color:#4CAF50;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background-color:#2E8B57;
    transform:scale(1.08);
}

/* 이름 */
h1{
    margin-top:25px;
    font-size:65px;
    color:blue;
    text-shadow:2px 2px 4px white;
}

</style>

<script>

function showImage(num){

    document.getElementById("photo").src=
    "https://raw.githubusercontent.com/jangmiya4665/ax/main/"+num+".png";

}

</script>

</head>

<body>

<div id="wrap">

    <!-- 이미지 -->
    <img id="photo"
         src="https://raw.githubusercontent.com/jangmiya4665/ax/main/1.png">

    <!-- 하단 -->
    <div id="bottom">

        <button onclick="showImage(1)">🌸 꽃 1</button>

        <button onclick="showImage(2)">🌺 꽃 2</button>

        <button onclick="showImage(3)">🌼 꽃 3</button>

        <h1>장미야</h1>

    </div>

</div>

</body>
</html>
